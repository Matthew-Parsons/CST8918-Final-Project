name: terraform-plan

on:
  pull_request:
    branches: [ main ]

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: TFLint
        uses: terraform-linters/setup-tflint@v4
      - run: tflint

      - name: Terraform plan
        run: terraform plan -no-color