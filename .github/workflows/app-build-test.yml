name: Build and Push Weather App

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'

permissions:
  id-token: write
  contents: read


jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build image
        run: docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/weather-app:${{ github.sha }} .

      - name: Push image
        run: docker push ${{ secrets.ACR_LOGIN_SERVER }}/weather-app:${{ github.sha }}