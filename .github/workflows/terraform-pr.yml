name: Terraform PR Checks

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'

permissions:
  id-token: write
  contents: read

jobs:
  plan-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/environments/test

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3

      - uses: terraform-linters/setup-tflint@v4

      - name: Terraform init
        run: terraform init -upgrade

      - name: TFLint init
        run: tflint --init

      - name: TFLint
        run: tflint

      - name: Terraform plan
        run: terraform plan -input=false -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" -var="weather_api_key=${{ secrets.WEATHER_API_KEY }}"