name: Terraform Apply Test

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      
permissions:
  id-token: write
  contents: read

jobs:
  apply-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/environments/test

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" -var="weather_api_key=${{ secrets.WEATHER_API_KEY }}"